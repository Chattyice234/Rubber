  <script>
    // Open Update Log
     function openUpdateLog() {
     document.getElementById("updatelog").style.display = "block";
     document.getElementById("blur-updatelog").style.display = "block";
     }
      
     // Close Update Log
     function closeUpdateLog() {
     document.getElementById("updatelog").style.display = "none";
     document.getElementById("blur-updatelog").style.display = "none";
     document.getElementById("button-ul").onclick = function() {
     openUpdateLog();
       };
     }

       // Save tab name to localStorage
     function changeTabName() {
         var tabName = document.getElementById("tabName").value;
         document.title = tabName;
         localStorage.setItem("tabName", tabName);
     }

     // Save tab icon to localStorage
     function changeTabIcon() {
         var tabIcon = document.getElementById("tabIcon").value;
         changeTabFavicon(tabIcon);
         localStorage.setItem("tabIcon", tabIcon);
     }

     // Change tab favicon
     function changeTabFavicon(iconUrl) {
         var link = document.querySelector("link[rel~='icon']");
         if (!link) {
             link = document.createElement('link');
             link.rel = 'icon';
             document.getElementsByTagName('head')[0].appendChild(link);
         }
         link.href = iconUrl;
         localStorage.setItem("tabIcon", iconUrl);
     }

     // Load tab name and icon from localStorage
     window.onload = function() {
         var savedTabName = localStorage.getItem("tabName");
         var savedTabIcon = localStorage.getItem("tabIcon");

         if (savedTabName) {
             document.title = savedTabName;
         }

         if (savedTabIcon) {
             changeTabFavicon(savedTabIcon);
         }
     }

     // Download Rubber Offline
     function download() {
     fetch('https://raw.githubusercontent.com/Chattyice234/Rubber/refs/heads/main/index.html')
     .then(response => response.text())  // Fetch as text
     .then(data => {

    function search_button() {
	let input = document.getElementById('searchBar').value
	input=input.toLowerCase();
	let x = document.getElementsByClassName('button');
	
	for (i = 0; i < x.length; i++) {
		if (!x[i].innerHTML.toLowerCase().includes(input)) {
			x[i].style.display="none";
		}
		else {
			x[i].style.display="inline";				
		}
	}
}
